<!-- One-time microphone permission page. Opened as a visible tab so the
     getUserMedia prompt has a user gesture and the extension origin; on grant
     it persists the flag and closes, letting the offscreen recorder run
     silently thereafter. -->
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enable microphone — Session Recorder</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: Canvas;
        color: CanvasText;
      }
      main {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.75rem;
      }
      #status {
        font-size: 0.95rem;
        line-height: 1.5;
        opacity: 0.85;
      }
      #status.error {
        color: #c0392b;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Microphone access</h1>
      <p id="status">Requesting microphone permission…</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
