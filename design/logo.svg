<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Single source of truth for every logo asset (icons, README, website).
       The mark fills the frame with almost no padding so it stands out at 16px.
       A white "die-cut" outline behind the coral dot and charcoal step line
       lets it read on any background, light or dark. Regenerate rasters from
       this file. -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- white halo -->
    <path d="M36 92 H70 V56 H105 V23" stroke="#ffffff" stroke-width="38" fill="none"/>
    <circle cx="36" cy="92" r="32" fill="#ffffff"/>

    <!-- charcoal step line -->
    <path d="M36 92 H70 V56 H105 V23" stroke="#16181d" stroke-width="19" fill="none"/>
    <!-- coral record dot -->
    <circle cx="36" cy="92" r="21" fill="#ff5a4d"/>
  </g>
</svg>
